name: mongo-express
image: docker.io/library/mongo-express:latest
description: Mongo Express web UI for the lerd MongoDB service
ports:
  - "8082:8081"
environment:
  ME_CONFIG_MONGODB_URL: mongodb://root:lerd@lerd-mongo:27017/?authSource=admin
  ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
  ME_CONFIG_BASICAUTH: "false"
depends_on:
  - mongo
dashboard: http://localhost:8082
