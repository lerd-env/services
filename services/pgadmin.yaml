name: pgadmin
image: docker.io/dpage/pgadmin4:latest
description: pgAdmin web UI for the lerd Postgres service
ports:
  - "8081:80"
environment:
  PGADMIN_DEFAULT_EMAIL: admin@pgadmin.org
  PGADMIN_DEFAULT_PASSWORD: lerd
  PGADMIN_CONFIG_SERVER_MODE: "False"
  PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
  PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
dynamic_env:
  LERD_POSTGRES_HOSTS: discover_family:postgres
depends_on:
  - postgres
dashboard: http://localhost:8081
files:
  - target: /pgadmin4/servers.json
    generator: pgadmin_servers
  - target: /pgpass
    mode: "0600"
    chown: true
    generator: pgadmin_pgpass
  - target: /pgadmin4/config_local.py
    content: |
      X_FRAME_OPTIONS = ''
      ENHANCED_COOKIE_PROTECTION = False
      WTF_CSRF_CHECK_DEFAULT = False

      # Allow pgadmin's Flask session + CSRF cookies to flow inside a cross-origin
      # iframe (the lerd-ui dashboard). SameSite=None requires Secure=True, which
      # browsers accept over HTTP on localhost.
      SESSION_COOKIE_SAMESITE = 'None'
      SESSION_COOKIE_SECURE = True
